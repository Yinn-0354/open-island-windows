name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "Version: $version, Tag: $tag"

      - name: Restore
        run: dotnet restore OpenIsland.sln

      - name: Publish OpenIsland.App (self-contained, win-x64)
        run: |
          dotnet publish src/OpenIsland.App/OpenIsland.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish/app

      - name: Publish OpenIsland.Hooks
        # Hooks 必须带完整运行时（.deps.json / .runtimeconfig.json / System.CommandLine.dll 等）—— 见 deploy.ps1
        run: |
          dotnet publish src/OpenIsland.Hooks/OpenIsland.Hooks.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish/hooks

      - name: Publish OpenIsland.Setup
        run: |
          dotnet publish src/OpenIsland.Setup/OpenIsland.Setup.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish/setup

      - name: Stage final layout
        shell: pwsh
        run: |
          $stage = "publish/OpenIsland-${{ steps.ver.outputs.tag }}-win-x64"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          # 拷贝顺序关键：先 hooks/setup（net8.0），最后 App（net8.0-windows）。
          # 三个 self-contained 发布有同名 DLL 冲突，最后写入的赢。
          # 关键冲突文件 WindowsBase.dll：
          #   - net8.0 publish 产出 16 KB / AssemblyVersion=4.0.0.0 的 .NET Framework 兼容 facade
          #   - net8.0-windows publish 产出 2.2 MB / AssemblyVersion=8.0.0.0 的 WPF 真实现
          # OpenIsland.exe (WPF) 运行时绑定 8.0.0.0，必须让 App 的真实现胜出 —— 否则启动
          # FileNotFoundException for WindowsBase 8.0.0.0，进程秒挂、屏幕没任何反应。
          # 经在 release 0.1.0 复现：旧顺序（App 在最前）会让 facade 覆盖真实现。
          Copy-Item publish/hooks/* $stage -Recurse -Force
          Copy-Item publish/setup/* $stage -Recurse -Force
          Copy-Item publish/app/* $stage -Recurse -Force
          Copy-Item README.md $stage -Force
          Copy-Item LICENSE $stage -Force
          Copy-Item CHANGELOG.md $stage -Force

      - name: Create ZIP
        shell: pwsh
        run: |
          $stage = "publish/OpenIsland-${{ steps.ver.outputs.tag }}-win-x64"
          $zip = "publish/OpenIsland-${{ steps.ver.outputs.tag }}-win-x64.zip"
          Compress-Archive -Path $stage/* -DestinationPath $zip -Force
          Get-ChildItem $zip

      - name: Compile Inno Setup installer
        # ISCC.exe 在 windows-latest runner 默认预装在 C:\Program Files (x86)\Inno Setup 6\
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
          STAGING_DIR: ${{ github.workspace }}\publish\OpenIsland-${{ steps.ver.outputs.tag }}-win-x64
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup 没找到，安装中..."
            choco install innosetup --no-progress -y
          }
          & $iscc /Qp "installer\openisland.iss"
          Get-ChildItem installer-output

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/OpenIsland-${{ steps.ver.outputs.tag }}-win-x64.zip
            installer-output/OpenIsland-Setup-${{ steps.ver.outputs.version }}-win-x64.exe
          generate_release_notes: true
          body: |
            **Open Island ${{ steps.ver.outputs.tag }}**

            ## 下载方式

            🟢 **推荐 · 普通用户** — 下载 `OpenIsland-Setup-${{ steps.ver.outputs.version }}-win-x64.exe`，双击安装。
            自动装到 `%LOCALAPPDATA%\OpenIsland`，无需管理员；可在 Add/Remove Programs 卸载。

            🟦 **绿色版 · 老司机** — 下载 `OpenIsland-${{ steps.ver.outputs.tag }}-win-x64.zip`，
            右键属性 → 解除锁定 → 解压 → 双击 `OpenIsland.exe`。

            ## 注意

            未做代码签名，Windows SmartScreen 会拦截。点 **更多信息 → 仍要运行**。

            首次启动会自动注册 Claude Code hooks 到 `~/.claude/settings.json`。

            完整变更：[CHANGELOG](https://github.com/ludiwangfpga/open-island-windows/blob/main/CHANGELOG.md)
